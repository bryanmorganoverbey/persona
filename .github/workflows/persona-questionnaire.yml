name: Persona Questionnaire — Enrich Profile via Telegram Q&A

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: persona-questionnaire
  cancel-in-progress: false

jobs:
  questionnaire:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      PERSONA_QUESTIONAIRE_BOT_TOKEN: ${{ secrets.PERSONA_QUESTIONAIRE_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      QUESTIONNAIRE_MAX_BUDGET_USD: '2.0'
      QUESTIONNAIRE_MODEL: 'MiniMax-M2.5'
      QUESTIONNAIRE_MAX_CALLS_PER_MIN: '5'
      QUESTIONNAIRE_MAX_TOKENS_PER_MIN: '10000'
      QUESTIONNAIRE_NUM_QUESTIONS: '5'
      QUESTIONNAIRE_STALE_HOURS: '24'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/persona-questionnaire/requirements.txt

      - name: Run persona questionnaire agent
        working-directory: ${{ github.workspace }}
        run: python scripts/persona-questionnaire/main.py "${{ github.workspace }}"
